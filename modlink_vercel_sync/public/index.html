<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ModLink Vercel Sync</title>
  <style>
    body{margin:0;font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:#07111f;color:#e5f7ff}
    main{max-width:960px;margin:0 auto;padding:36px 18px}
    .hero,.card{border:1px solid rgba(125,211,252,.25);border-radius:22px;background:rgba(15,23,42,.82);padding:22px;margin-bottom:18px}
    h1{margin:0;font-size:36px}.muted{color:#a7f3d0}
    button{padding:10px 14px;border:0;border-radius:12px;background:linear-gradient(135deg,#0ea5e9,#22c55e);color:white;font-weight:700}
    pre{white-space:pre-wrap;overflow:auto;background:#020617;padding:14px;border-radius:12px}
    .pack{border:1px solid rgba(148,163,184,.2);border-radius:14px;padding:12px;margin:10px 0;background:#02061766}
    a{color:#7dd3fc}
  </style>
</head>
<body>
  <main>
    <section class="hero">
      <h1>🔗 ModLink Vercel Sync</h1>
      <p class="muted">Vercel Functions + Blob powered ModPack sync server.</p>
      <button onclick="loadPacks()">Pack一覧を読み込み</button>
    </section>
    <section class="card">
      <h2>Pack一覧</h2>
      <div id="packs">未読み込み</div>
    </section>
    <section class="card">
      <h2>API</h2>
      <pre>GET /api/health
GET /api/packs
POST /api/packs
GET /api/packs/{pack_id}
PUT /api/packs/{pack_id}
GET /api/packs/{pack_id}/version
GET /api/code/{share_code}</pre>
    </section>
  </main>
<script>
async function loadPacks(){
  const el=document.getElementById("packs");
  el.textContent="読み込み中...";
  try{
    const r=await fetch("/api/packs",{cache:"no-store"});
    const j=await r.json();
    if(!j.packs || !j.packs.length){el.textContent="Packなし";return;}
    el.innerHTML="";
    for(const p of j.packs){
      const d=document.createElement("div");
      d.className="pack";
      d.innerHTML=`<b>${esc(p.name||p.pack_id)}</b><br>
        <span>MC ${esc(p.game_version||p.minecraft||"?")} / ${esc(p.loader||"?")} / v${esc(p.version||1)}</span><br>
        <a href="/api/packs/${encodeURIComponent(p.pack_id)}">manifest</a>`;
      el.appendChild(d);
    }
  }catch(e){el.textContent=String(e);}
}
function esc(s){return String(s).replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));}
</script>
</body>
</html>
